<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06070a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>ASTROLAB · HandSynth</title>
<style>
  :root { --ink:#ece7da; --dim:#7c7f88; --line:rgba(236,231,218,.16); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:#06070a; color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif; overflow:hidden; }
  #stage { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column;
    justify-content:space-between; padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    pointer-events:none; }
  header { padding-top:24px; }
  h1 { font-size:18px; letter-spacing:.18em; margin:0; text-transform:uppercase; font-weight:400; }
  .sub { color:var(--dim); font-size:12px; letter-spacing:.05em; margin-top:6px; font-style:italic; }
  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #loading { color:var(--dim); font-style:italic; font-size:15px; letter-spacing:.04em; }
  button { pointer-events:auto; font-family:inherit; color:var(--ink);
    background:rgba(236,231,218,.05); border:1px solid var(--line); border-radius:2px;
    padding:14px 22px; font-size:14px; letter-spacing:.12em; text-transform:uppercase; }
  button:active { background:rgba(236,231,218,.12); }
  #start { font-size:16px; padding:18px 40px; }
  .controls { display:flex; gap:10px; justify-content:center; padding-bottom:24px; flex-wrap:wrap; }
  .hidden { display:none !important; }
  .active { background:rgba(236,231,218,.18) !important; }
  .bpm { pointer-events:auto; display:flex; align-items:center; gap:8px; color:var(--dim);
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; }
  .bpm input { accent-color:#c9a24a; width:96px; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="overlay">
    <header>
      <h1>ASTROLAB · HandSynth</h1>
      <div class="sub">closer = louder · close your hand to freeze a layer · A=432</div>
    </header>

    <div class="center">
      <div id="loading" class="hidden">waking the field…</div>
    </div>

    <div>
      <div class="controls" id="startRow"><button id="cam-toggle">Camera · Rear</button><button id="start">Begin</button></div>
      <div class="controls hidden" id="ctrlRow">
        <button id="sound">Sound · Synth</button>
        <button id="fs">Fullscreen</button>
        <button id="freeze">Hold</button>
        <button id="clear">Clear</button>
        <button id="temple">Temple</button>
        <button id="mode">Mode</button>
        <button id="smart">Smart</button>
        <button id="chords">Chords</button>
        <button id="keys">Keys</button>
        <button id="objects">Objects</button>
        <button id="catch">Catch</button>
        <button id="loop">Loop</button>
        <button id="pulse">Pulse</button>
        <button id="rec">Record</button>
        <label class="bpm">BPM <input id="bpm" type="range" min="40" max="120" value="58" /></label>
      </div>
    </div>
  </div>

  <video id="cam" playsinline muted style="display:none"></video>
  <script type="module" src="hands.js?v=27"></script>
</body>
</html>
