<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06070a" />
<title>ASTROLAB · Pulse</title>
<style>
  :root { --ink:#ece7da; --dim:#7c7f88; --line:rgba(236,231,218,.16); }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:#06070a; color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif; overflow:hidden; }
  #stage { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column;
    justify-content:space-between; padding:env(safe-area-inset-top) 22px env(safe-area-inset-bottom);
    pointer-events:none; text-align:center; }
  header { padding-top:26px; }
  h1 { font-size:18px; letter-spacing:.18em; margin:0; text-transform:uppercase; font-weight:400; }
  .sub { color:var(--dim); font-size:12px; letter-spacing:.05em; margin-top:6px; font-style:italic; }
  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #bpm { font-size:64px; letter-spacing:.02em; }
  #bpm small { font-size:18px; color:var(--dim); letter-spacing:.16em; }
  #state { margin-top:8px; color:var(--dim); font-size:15px; font-style:italic; letter-spacing:.08em; }
  button { pointer-events:auto; font-family:inherit; color:var(--ink);
    background:rgba(236,231,218,.05); border:1px solid var(--line); border-radius:2px;
    padding:16px 36px; font-size:16px; letter-spacing:.12em; text-transform:uppercase; }
  button:active { background:rgba(236,231,218,.12); }
  .row { display:flex; justify-content:center; padding-bottom:26px; }
  .hidden { display:none !important; }
  #loading { color:var(--dim); font-style:italic; font-size:15px; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="overlay">
    <header>
      <h1>ASTROLAB · Pulse</h1>
      <div class="sub">sit still · soft light on your face · headphones · the drone finds your heart</div>
    </header>
    <div class="center">
      <div id="bpm" class="hidden">--<small> bpm</small></div>
      <div id="state"></div>
      <div id="loading" class="hidden">waking the field…</div>
    </div>
    <div class="row"><button id="start">Begin</button></div>
  </div>
  <video id="cam" playsinline muted style="display:none"></video>
  <script type="module" src="pulse.js?v=4"></script>
</body>
</html>
