<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#06070a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>ASTROLAB · Field Interpreter</title>
<style>
  :root { --ink:#ece7da; --dim:#7c7f88; --line:rgba(236,231,218,.14); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; background:#06070a; color:var(--ink);
    font-family: Georgia, 'Times New Roman', serif; overflow:hidden; }
  #field { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .ui { position:fixed; inset:0; display:flex; flex-direction:column;
    justify-content:space-between; padding:env(safe-area-inset-top) 22px env(safe-area-inset-bottom); pointer-events:none; }
  header { padding-top:26px; }
  h1 { font-size:19px; letter-spacing:.16em; font-weight:400; margin:0; text-transform:uppercase; }
  .sub { color:var(--dim); font-size:12.5px; letter-spacing:.05em; margin-top:6px; font-style:italic; }
  .center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #status { font-size:30px; letter-spacing:.04em; font-style:italic; color:var(--ink); opacity:.92; }
  #identity { margin-top:10px; color:var(--dim); font-size:14px; letter-spacing:.18em; text-transform:uppercase; }
  button { pointer-events:auto; font-family:inherit; color:var(--ink);
    background:rgba(236,231,218,.04); border:1px solid var(--line); border-radius:2px;
    padding:15px 26px; font-size:15px; letter-spacing:.12em; text-transform:uppercase; }
  button:active { background:rgba(236,231,218,.1); }
  #start { font-size:17px; padding:18px 40px; }
  .hidden { display:none !important; }
  #panel { pointer-events:auto; }
  .macros { display:grid; grid-template-columns:1fr 1fr; gap:14px 22px; margin-bottom:16px; }
  .macro label { display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:6px; }
  input[type=range]{ -webkit-appearance:none; width:100%; height:2px; background:var(--line); border-radius:2px; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:var(--ink); border:none; }
  input[type=range]::-moz-range-thumb{ width:18px; height:18px; border-radius:50%; background:var(--ink); border:none; }
  #freeze.active { background:rgba(236,231,218,.16); }
  .row { display:flex; justify-content:center; padding-bottom:24px; }
  #cam { position:fixed; top:14px; right:14px; width:104px; height:78px; object-fit:cover;
    border:1px solid var(--line); border-radius:6px; opacity:.5; z-index:5;
    pointer-events:none; box-shadow:0 6px 22px rgba(0,0,0,.5); }
</style>
</head>
<body>
  <canvas id="field"></canvas>
  <div class="ui">
    <header>
      <h1>ASTROLAB</h1>
      <div class="sub">field interpreter · the place becomes sound · A=432</div>
    </header>

    <div class="center">
      <div id="status">untuned</div>
      <div id="identity"></div>
    </div>

    <div>
      <button id="start">Start Listening</button>

      <div id="panel" class="hidden">
        <div class="macros">
          <div class="macro"><label>body</label><input id="body" type="range" min="0" max="100" value="55"></div>
          <div class="macro"><label>warmth</label><input id="warmth" type="range" min="0" max="100" value="50"></div>
          <div class="macro"><label>space</label><input id="space" type="range" min="0" max="100" value="55"></div>
          <div class="macro"><label>sensitivity</label><input id="sensitivity" type="range" min="0" max="100" value="60"></div>
        </div>
        <div class="row"><button id="freeze">freeze field</button></div>
      </div>
    </div>
  </div>
  <script src="app.js?v=2"></script>
</body>
</html>
